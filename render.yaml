services:
  - type: web
    name: backtester-backend
    runtime: python3
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0

  - type: web
    name: backtester-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npx vite build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
    envVars:
      - key: VITE_API_URL
        value: https://backtester-backend.onrender.com
